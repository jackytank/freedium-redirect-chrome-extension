<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Freedium Redirect Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px 32px;
      max-width: 420px;
      color: #222;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 16px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 6px;
      color: #555;
    }
    input {
      box-sizing: border-box;
      width: 100%;
      padding: 8px 10px;
      font-size: 0.9375rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }
    input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 2px rgba(26, 86, 219, 0.15);
    }
    .hint {
      margin-top: 6px;
      font-size: 0.8rem;
      color: #888;
    }
    #status {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #1a56db;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Freedium Redirect</h1>

  <label for="mirrorDomain">Mirror domain</label>
  <input
    type="text"
    id="mirrorDomain"
    placeholder="freedium-mirror.cfd"
    spellcheck="false"
  >
  <div class="hint">
    Medium articles will be redirected through this domain.
    Changes apply immediately.
  </div>

  <div id="status"></div>

  <script src="dist/options.js"></script>
</body>
</html>
