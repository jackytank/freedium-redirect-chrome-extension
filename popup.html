<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }
    h1 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .row-label {
      color: #444;
      user-select: none;
    }
    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 10px 0 8px;
    }
    .settings-link {
      display: block;
      color: #555;
      text-decoration: none;
      padding: 4px 0;
      font-size: 12px;
    }
    .settings-link:hover {
      color: #1a56db;
    }
    .mirror-domain {
      font-size: 11px;
      color: #888;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Freedium Redirect</h1>

  <div class="mirror-domain" id="mirrorDomainDisplay"></div>

  <hr class="divider">

  <a class="settings-link" id="settingsLink" href="#">Settings…</a>

  <script src="dist/popup.js"></script>
</body>
</html>
