<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }
    h1 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .row-label {
      color: #444;
      user-select: none;
    }
    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 10px 0 8px;
    }
    .settings-link {
      display: block;
      color: #555;
      text-decoration: none;
      padding: 4px 0;
      font-size: 12px;
    }
    .settings-link:hover {
      color: #1a56db;
    }
    .mirror-domain {
      font-size: 11px;
      color: #888;
      word-break: break-all;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      border-radius: 22px;
      transition: background-color 0.2s;
    }
    .toggle-slider::before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background-color: #1a8917;
    }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <h1>Freedium Redirect</h1>

  <div class="row">
    <span class="row-label">Auto Redirect</span>
    <label class="toggle">
      <input type="checkbox" id="autoRedirectToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="mirror-domain" id="mirrorDomainDisplay"></div>

  <hr class="divider">

  <a class="settings-link" id="settingsLink" href="#">Settings…</a>

  <script src="dist/popup.js"></script>
</body>
</html>
